name: Build Overay Desk Launch Pilot (K8s)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: bold-proton-467706-f3
  REGION: asia-northeast3
  REPOSITORY: overay
  IMAGE_NAME: overay-desk-launch-pilot
  GITOPS_REPO: OverayInc/overay-platform-gitops
  GITOPS_PATH: app/overay/desk-launch-pilot/overlays/dev

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # 스모크 테스트는 실행 중인 서버를 가정 → 서버 부팅 후 health 대기 → 테스트 → 종료
      - name: Run smoke tests
        env:
          HOST: "127.0.0.1"
          PORT: "4173"
          DISABLE_SYNC_SCHEDULER: "true"
          DATA_FILE: /tmp/glp/app-data.json
          DATA_DB: /tmp/glp/app.db
        run: |
          mkdir -p /tmp/glp
          node src/server.mjs &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:4173/api/health >/dev/null && { ready=1; break; }
            sleep 1
          done
          if [ -z "$ready" ]; then echo "server failed to start"; kill $SERVER_PID 2>/dev/null; exit 1; fi
          node --test tests/*.test.mjs
          status=$?
          kill $SERVER_PID 2>/dev/null
          exit $status

      - uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:dev-latest
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update GitOps repo
        continue-on-error: true
        env:
          GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          if [ -z "$GITOPS_TOKEN" ]; then
            echo "GITOPS_TOKEN not set, skipping GitOps update"
            exit 0
          fi
          git clone https://x-access-token:$GITOPS_TOKEN@github.com/${{ env.GITOPS_REPO }}.git gitops
          cd gitops/${{ env.GITOPS_PATH }}
          sed -i "s/newTag: .*/newTag: \"${{ github.sha }}\"/" kustomization.yaml
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "chore(${{ env.IMAGE_NAME }}): update image to ${{ github.sha }}"
          git push
