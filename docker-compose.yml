services:
  growth-dashboard:
    build:
      context: .
    container_name: launch-pilot-growth-dashboard
    ports:
      - "4173:4173"
    environment:
      HOST: 0.0.0.0
      PORT: 4173
      DATA_FILE: /app/data/app-data.json
      DATA_DB: /app/data/app.db
      STEAM_APP_ID: ${STEAM_APP_ID:-0}
      STEAM_FINANCIAL_API_KEY: ${STEAM_FINANCIAL_API_KEY:-}
      KEY_ENCRYPTION_SECRET: ${KEY_ENCRYPTION_SECRET:-development-only-change-me}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-true}
      EMAIL_FROM: ${EMAIL_FROM:-}
      EMAIL_REPLY_TO: ${EMAIL_REPLY_TO:-}
      EMAIL_SEND_MODE: ${EMAIL_SEND_MODE:-smtp}
      DISABLE_SYNC_SCHEDULER: ${DISABLE_SYNC_SCHEDULER:-false}
      SYNC_SCHEDULER_INTERVAL_MS: ${SYNC_SCHEDULER_INTERVAL_MS:-60000}
      # --- Discovery bot (gemma analyzer + search sources) ---
      LP_AI_BASE_URL: ${LP_AI_BASE_URL:-}
      LP_AI_MODEL: ${LP_AI_MODEL:-}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      TWITCH_CLIENT_ID: ${TWITCH_CLIENT_ID:-}
      TWITCH_CLIENT_SECRET: ${TWITCH_CLIENT_SECRET:-}
      WEB_SEARCH_PROVIDER: ${WEB_SEARCH_PROVIDER:-}
      WEB_SEARCH_API_KEY: ${WEB_SEARCH_API_KEY:-}
      # Headless-browser email harvesting (uses the Chromium baked into the image)
      DISCOVERY_USE_RENDERER: ${DISCOVERY_USE_RENDERER:-false}
      DISABLE_DISCOVERY_SCHEDULER: ${DISABLE_DISCOVERY_SCHEDULER:-true}
      # --- Reddit (browser-scraped; the API is gone in 2026) ---
      REDDIT_REFRESH_HOURS: ${REDDIT_REFRESH_HOURS:-6}
      # Logged-in session for author-only data (view counts). Capture on a desktop
      # with `npm run reddit:login`, then drop the file into ./data (gitignored).
      REDDIT_STATE_FILE: ${REDDIT_STATE_FILE:-/app/data/reddit-state.json}
      # Microsoft (Entra ID) login — empty by default = gate OFF (open). Set
      # MS_CLIENT_ID + AUTH_ALLOWED_EMAILS/DOMAIN (host env or .env) to enable.
      MS_CLIENT_ID: ${MS_CLIENT_ID:-}
      MS_TENANT_ID: ${MS_TENANT_ID:-f1f0a729-25be-432c-b9c9-24775c52aa1a}
      AUTH_ALLOWED_DOMAIN: ${AUTH_ALLOWED_DOMAIN:-}
      AUTH_ALLOWED_EMAILS: ${AUTH_ALLOWED_EMAILS:-}
      AUTH_ENABLED: ${AUTH_ENABLED:-}
    volumes:
      - ./data:/app/data
      # public/ and src/ are bind-mounted so code changes apply without an image rebuild
      # (public: refresh the page; src: `docker compose restart`). Remove for a self-contained prod image.
      - ./public:/app/public:ro
      - ./src:/app/src:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4173/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
